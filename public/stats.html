<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KawaiiYumee | Server Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"Space Mono"', 'monospace'],
                        sans: ['"Space Grotesk"', 'sans-serif'],
                    },
                    colors: {
                        'k-bg': '#0a0a0f',
                        'k-surface': '#111118',
                        'k-card': '#16161f',
                        'k-border': '#2a2a3a',
                        'k-accent': '#7c3aed',
                        'k-accent2': '#a855f7',
                        'k-text': '#e2e8f0',
                        'k-muted': '#64748b',
                    }
                }
            }
        }
    </script>
    <style>
        html, body { background: #0a0a0f; }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7c3aed55; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #7c3aed; }

        #realtime-logs::-webkit-scrollbar { width: 5px; }
        #realtime-logs::-webkit-scrollbar-track { background: #0d0d14; }
        #realtime-logs::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }

        .meter-bar { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        .k-card-el {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
        }
        .k-card-el:hover { border-color: #7c3aed44; }

        @keyframes pulseBar { 0%,100% { opacity:1; } 50% { opacity:.6; } }
        .pulse-bar { animation: pulseBar 2s ease-in-out infinite; }

        @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .fade-up { animation: fadeUp .5s ease both; }

        .stat-icon {
            width: 42px; height: 42px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
    </style>
</head>
<body class="text-k-text min-h-screen flex flex-col font-sans relative z-[1]">

    <!-- NAV -->
    <nav class="sticky top-0 z-[60] bg-k-surface/90 backdrop-blur-md border-b border-k-border w-full">
        <div class="max-w-5xl mx-auto px-4 h-14 flex items-center gap-4 justify-between">
            <div class="flex items-center gap-3">
                <a href="/" class="w-8 h-8 rounded-lg bg-k-border hover:bg-k-accent transition-all flex items-center justify-center text-k-muted hover:text-white text-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                </a>
                <div>
                    <h1 class="font-bold text-sm tracking-tight text-k-text">System Monitor</h1>
                    <span class="text-[9px] font-mono text-k-accent tracking-widest uppercase">Live Stats</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-[10px] font-mono text-k-muted">LIVE</span>
                <a href="/docs" class="ml-2 text-[10px] font-bold bg-k-card border border-k-border px-3 py-1.5 rounded-lg text-k-muted hover:border-k-accent hover:text-k-accent transition-all">DOCS</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-6 flex flex-col gap-5 relative z-10">

        <!-- TOP 3 CARDS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

            <!-- uptime -->
            <div class="k-card-el p-5 transition-all fade-up" style="animation-delay:.05s">
                <div class="flex items-center gap-3 mb-4">
                    <div class="stat-icon bg-green-500/10 text-green-400" style="box-shadow:0 0 20px rgba(74,222,128,0.1)">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-mono text-k-muted uppercase tracking-widest">System Uptime</p>
                        <p id="uptime" class="font-mono font-bold text-k-text text-sm">--</p>
                    </div>
                </div>
                <div class="w-full bg-k-bg h-1 rounded-full overflow-hidden">
                    <div class="h-full bg-green-500 pulse-bar w-full rounded-full"></div>
                </div>
            </div>

            <!-- platform -->
            <div class="k-card-el p-5 transition-all fade-up" style="animation-delay:.1s">
                <div class="flex items-center gap-3 mb-4">
                    <div class="stat-icon bg-k-accent/10 text-k-accent2" style="box-shadow:0 0 20px rgba(124,58,237,0.15)">
                        <i class="fa-solid fa-server"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-mono text-k-muted uppercase tracking-widest">Platform</p>
                        <p id="platform" class="font-mono font-bold text-k-text text-sm truncate max-w-[140px]">--</p>
                    </div>
                </div>
                <div class="flex gap-2 flex-wrap">
                    <span id="arch" class="text-[10px] font-mono bg-k-accent/10 text-k-accent2 px-2 py-0.5 rounded-md border border-k-accent/20">--</span>
                    <span id="node-ver" class="text-[10px] font-mono bg-purple-500/10 text-purple-400 px-2 py-0.5 rounded-md border border-purple-500/20">--</span>
                </div>
            </div>

            <!-- cpu -->
            <div class="k-card-el p-5 transition-all fade-up" style="animation-delay:.15s">
                <div class="flex items-center gap-3 mb-4">
                    <div class="stat-icon bg-red-500/10 text-red-400" style="box-shadow:0 0 20px rgba(248,113,113,0.1)">
                        <i class="fa-solid fa-microchip"></i>
                    </div>
                    <div>
                        <p class="text-[9px] font-mono text-k-muted uppercase tracking-widest">CPU Load</p>
                        <p id="cpu-load" class="font-mono font-bold text-k-text text-sm">0%</p>
                    </div>
                </div>
                <p id="cpu-model" class="text-[10px] font-mono text-k-muted truncate">Detecting...</p>
            </div>

        </div>

        <!-- MEMORY -->
        <div class="k-card-el p-5 fade-up" style="animation-delay:.2s">
            <div class="flex items-center gap-2 mb-5">
                <i class="fa-solid fa-memory text-k-accent2 text-sm"></i>
                <h2 class="text-sm font-bold text-k-text tracking-wide uppercase">Memory Usage</h2>
            </div>
            <div class="flex justify-between text-[10px] font-mono text-k-muted mb-2">
                <span>USED: <span id="mem-used" class="text-k-text font-bold">--</span></span>
                <span>FREE: <span id="mem-free" class="text-k-text font-bold">--</span></span>
                <span>TOTAL: <span id="mem-total" class="text-k-text font-bold">--</span></span>
            </div>
            <div class="w-full h-7 bg-k-bg rounded-lg overflow-hidden border border-k-border relative">
                <div id="ram-bar" class="h-full meter-bar w-0 flex items-center justify-end pr-2 rounded-lg"
                    style="background: linear-gradient(90deg, #7c3aed, #a855f7);">
                    <span id="ram-percent" class="text-[10px] font-bold text-white drop-shadow">0%</span>
                </div>
                <!-- grid lines -->
                <div class="absolute inset-0 grid grid-cols-10 pointer-events-none">
                    <div class="border-r border-white/5"></div><div class="border-r border-white/5"></div>
                    <div class="border-r border-white/5"></div><div class="border-r border-white/5"></div>
                    <div class="border-r border-white/5"></div><div class="border-r border-white/5"></div>
                    <div class="border-r border-white/5"></div><div class="border-r border-white/5"></div>
                    <div class="border-r border-white/5"></div>
                </div>
            </div>
        </div>

        <!-- REQUEST LOGS -->
        <div class="k-card-el overflow-hidden flex flex-col h-[280px] font-mono text-xs fade-up" style="animation-delay:.25s; box-shadow:0 0 30px rgba(124,58,237,0.08)">
            <div class="bg-k-surface px-3 py-2.5 flex items-center justify-between border-b border-k-border select-none">
                <div class="flex items-center gap-2">
                    <div class="flex gap-1.5">
                        <div class="w-2.5 h-2.5 rounded-full bg-red-500/70"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-yellow-500/70"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-green-500/70"></div>
                    </div>
                    <span class="text-[10px] font-mono text-k-muted font-bold ml-1">Public Requests</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-[9px] text-k-muted">live</span>
                </div>
            </div>
            <div id="realtime-logs" class="p-3 overflow-y-auto flex-1 space-y-0.5 leading-relaxed bg-[#0d0d14]">
                <div class="text-k-muted italic text-[10px]">Listening for requests...</div>
            </div>
        </div>

    </main>

    <script>
        const updateInterval = 1000;
        let lastRequestsJson = '';

        async function fetchStats() {
            try {
                const response = await fetch('/stats/data');
                const data = await response.json();
                if(data.status) {
                    const s = data.server;
                    document.getElementById('uptime').innerText = s.uptime;
                    document.getElementById('platform').innerText = s.hostname;
                    document.getElementById('arch').innerText = s.arch;
                    document.getElementById('node-ver').innerText = s.node_version;
                    document.getElementById('cpu-model').innerText = `${s.cpu.model} (${s.cpu.cores} Cores)`;
                    document.getElementById('cpu-load').innerText = (parseFloat(s.cpu.load) * 10).toFixed(1) + '%';
                    document.getElementById('mem-used').innerText = s.memory.used;
                    document.getElementById('mem-total').innerText = s.memory.total;
                    document.getElementById('mem-free').innerText = s.memory.free;

                    const ramBar = document.getElementById('ram-bar');
                    const ramPct = document.getElementById('ram-percent');
                    ramBar.style.width = `${s.memory.percent}%`;
                    ramPct.innerText = `${s.memory.percent}%`;

                    if(s.memory.percent > 90)
                        ramBar.style.background = 'linear-gradient(90deg,#ef4444,#f87171)';
                    else if(s.memory.percent > 70)
                        ramBar.style.background = 'linear-gradient(90deg,#f59e0b,#fbbf24)';
                    else
                        ramBar.style.background = 'linear-gradient(90deg,#7c3aed,#a855f7)';

                    const newJson = JSON.stringify(data.requests);
                    if(data.requests && newJson !== lastRequestsJson) {
                        lastRequestsJson = newJson;
                        renderLogs(data.requests);
                    }
                }
            } catch(e) { console.error('Stats fetch error', e); }
        }

        function renderLogs(logs) {
            const container = document.getElementById('realtime-logs');
            container.innerHTML = '';

            if(!logs || logs.length === 0) {
                container.innerHTML = '<div class="text-k-muted italic text-[10px]">Listening for requests...</div>';
                return;
            }

            logs.slice().reverse().forEach(log => {
                const div = document.createElement('div');
                div.className = 'break-all hover:bg-white/[0.03] px-1.5 py-0.5 rounded transition-colors flex gap-2 items-baseline';

                const match = log.match(/^\[([A-Z]+)\] \[(\d+)\] (.*)$/);
                if(match) {
                    const method = match[1], status = match[2], url = match[3];
                    const mColors = { GET:'text-k-accent2', POST:'text-green-400', DELETE:'text-red-400', PUT:'text-yellow-400' };
                    const mColor = mColors[method] || 'text-k-muted';
                    const sColor = status.startsWith('2') ? 'text-green-400' : status.startsWith('4') || status.startsWith('5') ? 'text-red-400' : 'text-yellow-400';
                    div.innerHTML = `
                        <span class="${mColor} font-bold w-10 shrink-0 text-[10px]">${method}</span>
                        <span class="${sColor} font-bold w-8 shrink-0 text-[10px]">${status}</span>
                        <span class="text-k-muted truncate text-[10px]">${url}</span>
                    `;
                } else {
                    div.innerHTML = `<span class="text-k-muted text-[10px]">${log}</span>`;
                }
                container.appendChild(div);
            });
            container.scrollTop = 0;
        }

        fetchStats();
        setInterval(fetchStats, updateInterval);
    </script>
</body>
</html>

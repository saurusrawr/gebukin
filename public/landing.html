<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KawaiiYumee | Dashboard</title>
    <link id="favicon" rel="icon" href="">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        mono: ['"JetBrains Mono"', 'monospace'],
                        display: ['"Space Grotesk"', 'sans-serif']
                    },
                    colors: {
                        'k-bg': '#0a0a0f',
                        'k-surface': '#111118',
                        'k-card': '#16161f',
                        'k-border': '#2a2a3a',
                        'k-accent': '#7c3aed',
                        'k-accent2': '#a855f7',
                        'k-pink': '#ec4899',
                        'k-text': '#e2e8f0',
                        'k-muted': '#64748b',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'fade-up': 'fadeUp 0.5s ease-out forwards',
                        'shimmer': 'shimmer 1.5s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '200% 0' },
                            '100%': { backgroundPosition: '-200% 0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; }

        /* noise + grid */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7c3aed55; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #7c3aed; }

        .shimmer {
            background: linear-gradient(90deg, #16161f 0%, #2a2a3a 50%, #16161f 100%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* soft button */
        .soft-btn {
            --button-raise-level: 8px;
            --press-inset: 4px;
            --button-hover-pressure: 1.5;
            --transform-speed: 160ms;
            --radius: 12px;
            --border-width: 0px;
            --glare-rgb: 255, 255, 255;
            --glare-alpha: 0.15;
            --glare-width: 20;
            position: relative; border: none; background: transparent;
            padding: 0; cursor: pointer; user-select: none; outline: none;
            -webkit-tap-highlight-color: transparent; display: block; text-decoration: none;
        }
        .soft-btn__wrapper { position: relative; display: block; width: 100%; height: 100%; transform-style: preserve-3d; }
        .soft-btn__wrapper::before {
            content: ''; position: absolute; left: 0; right: 0; bottom: 0;
            height: calc(100% - var(--button-raise-level));
            background: var(--side-color); border-radius: var(--radius); z-index: 1;
        }
        .soft-btn__content {
            position: relative; width: 100%; height: calc(100% - var(--button-raise-level));
            background: var(--surface-color); color: var(--text-color);
            border-radius: var(--radius); display: flex; align-items: center; justify-content: center;
            transform: translateY(0); transition: transform var(--transform-speed) ease-out;
            will-change: transform; z-index: 2;
            border: var(--border-width) solid var(--border-color);
        }
        .soft-btn__content::after {
            content: ''; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
            background: linear-gradient(90deg,
                rgba(var(--glare-rgb), 0) calc(50% - var(--glare-width) * 1%),
                rgba(var(--glare-rgb), calc(var(--glare-alpha) * 0.5)) calc(50% - var(--glare-width) * 0.5%),
                rgba(var(--glare-rgb), var(--glare-alpha)) 50%,
                rgba(var(--glare-rgb), calc(var(--glare-alpha) * 0.5)) calc(50% + var(--glare-width) * 0.5%),
                rgba(var(--glare-rgb), 0) calc(50% + var(--glare-width) * 1%));
            background-size: 200% 100%; background-position: 50% 50%; opacity: 0;
            transition: opacity 160ms ease, background-position var(--transform-speed) ease; z-index: 3;
        }
        .soft-btn__inner { display: inline-flex; align-items: center; justify-content: center; gap: 8px; z-index: 4; width: 100%; height: 100%; pointer-events: none; }
        .soft-btn--middle .soft-btn__content { transform: translateY(calc(1px * var(--button-hover-pressure))); }
        .soft-btn--left .soft-btn__content { transform: skewY(calc(-1deg * var(--button-hover-pressure))); }
        .soft-btn--right .soft-btn__content { transform: skewY(calc(1deg * var(--button-hover-pressure))); }
        .soft-btn--active .soft-btn__content { transform: translateY(var(--press-inset)); transition: transform calc(var(--transform-speed) * 0.8) ease-out; }
        .soft-btn--active.soft-btn--left .soft-btn__content { transform: skewY(calc(-1deg * var(--button-hover-pressure))) translateY(var(--press-inset)); }
        .soft-btn--active.soft-btn--right .soft-btn__content { transform: skewY(calc(1deg * var(--button-hover-pressure))) translateY(var(--press-inset)); }
        .soft-btn--right .soft-btn__content::after { opacity: 1; background-position: 0% 50%; }
        .soft-btn--middle .soft-btn__content::after { opacity: 1; background-position: 50% 50%; }
        .soft-btn--left .soft-btn__content::after { opacity: 1; background-position: 100% 50%; }
        .soft-btn--active .soft-btn__content::after { opacity: 1; background: rgba(var(--glare-rgb), var(--glare-alpha)); }

        /* variants */
        .variant-solid { --surface-color: #7c3aed; --side-color: #4c1d95; --text-color: #fff; --border-color: transparent; }
        .variant-outline { --surface-color: #16161f; --side-color: #2a2a3a; --text-color: #e2e8f0; --border-color: #2a2a3a; --border-width: 1px; }
        .variant-steel { --surface-color: #16161f; --side-color: #1e1e2a; --text-color: #94a3b8; --border-color: #2a2a3a; --border-width: 1px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-mono p-4 selection:bg-k-accent selection:text-white relative overflow-y-auto">

    <!-- blobs -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute top-0 left-1/4 w-72 h-72 bg-k-accent/10 rounded-full filter blur-3xl opacity-60 animate-blob"></div>
        <div class="absolute top-0 right-1/4 w-72 h-72 bg-k-accent2/10 rounded-full filter blur-3xl opacity-60 animate-blob" style="animation-delay: 2s"></div>
        <div class="absolute -bottom-8 left-1/3 w-72 h-72 bg-k-pink/10 rounded-full filter blur-3xl opacity-60 animate-blob" style="animation-delay: 4s"></div>
    </div>

    <div class="relative z-10 w-full max-w-[420px]">
        <div class="bg-k-card/80 backdrop-blur-xl border border-k-border rounded-2xl overflow-y-auto transition-all duration-300" style="box-shadow: 0 0 40px rgba(124,58,237,0.15), 0 0 0 1px rgba(124,58,237,0.1);">

            <!-- titlebar -->
            <div class="bg-k-surface border-b border-k-border px-4 py-3 flex justify-between items-center select-none">
                <div class="flex gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500/70 border border-red-700/50"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500/70 border border-yellow-700/50"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500/70 border border-green-700/50"></div>
                </div>
                <div class="flex items-center gap-2 px-2 py-0.5 rounded-md bg-k-bg border border-k-border">
                    <div class="w-1.5 h-1.5 rounded-full bg-k-accent animate-pulse"></div>
                    <span class="text-[10px] font-bold text-k-muted tracking-wider">ONLINE</span>
                </div>
            </div>

            <div class="p-6 relative">

                <!-- loader -->
                <div id="loader" class="flex flex-col gap-4">
                    <div class="w-full aspect-[16/9] border border-k-border shimmer rounded-xl"></div>
                    <div class="space-y-2 mt-2">
                        <div class="h-8 w-2/3 shimmer rounded-lg"></div>
                        <div class="h-4 w-full shimmer rounded-lg"></div>
                        <div class="h-4 w-5/6 shimmer rounded-lg"></div>
                    </div>
                    <div class="flex gap-3 mt-2">
                        <div class="h-12 w-1/2 shimmer rounded-xl"></div>
                        <div class="h-12 w-1/2 shimmer rounded-xl"></div>
                    </div>
                </div>

                <div id="content" class="hidden">

                    <!-- thumbnail -->
                    <div class="relative w-full aspect-[16/9] border border-k-border rounded-xl overflow-hidden group mb-6 bg-k-bg">
                        <div class="absolute inset-0 bg-k-accent/10 z-10 group-hover:bg-transparent transition-all duration-300"></div>
                        <img id="dash-thumb" src="" alt="Cover" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700 ease-in-out">
                        <div class="absolute bottom-3 left-3 z-20">
                            <span class="bg-k-surface/90 backdrop-blur border border-k-border px-2 py-1 text-[10px] font-bold rounded-md flex items-center gap-1 text-k-accent">
                                <i class="fa-solid fa-server"></i> <span id="badge-version">v1.0.0</span>
                            </span>
                        </div>
                    </div>

                    <!-- title -->
                    <div class="mb-6 text-center animate-fade-up">
                        <h1 id="dash-title" class="text-3xl font-display font-bold text-k-text mb-2 tracking-tight uppercase"></h1>
                        <div class="flex justify-center mb-3">
                            <div class="h-0.5 w-12 bg-gradient-to-r from-k-accent to-k-accent2 rounded-full"></div>
                        </div>
                        <p id="dash-desc" class="text-sm font-mono text-k-muted leading-relaxed px-2"></p>
                    </div>

                    <!-- stats -->
                    <div class="grid grid-cols-3 gap-3 mb-5 animate-fade-up" style="animation-delay: 0.08s">
                        <div class="bg-k-bg border border-k-border rounded-xl p-3 text-center">
                            <div class="text-lg font-display font-bold text-k-accent" id="stat-endpoints">-</div>
                            <div class="text-[10px] font-mono text-k-muted uppercase tracking-wider mt-0.5">Endpoint</div>
                        </div>
                        <div class="bg-k-bg border border-k-border rounded-xl p-3 text-center">
                            <div class="text-lg font-display font-bold text-k-accent2" id="stat-visitors">-</div>
                            <div class="text-[10px] font-mono text-k-muted uppercase tracking-wider mt-0.5">Visitors</div>
                        </div>
                        <div class="bg-k-bg border border-k-border rounded-xl p-3 text-center">
                            <div class="text-lg font-display font-bold text-k-text" id="stat-version">-</div>
                            <div class="text-[10px] font-mono text-k-muted uppercase tracking-wider mt-0.5">Version</div>
                        </div>
                    </div>

                    <!-- docs + stats -->
                    <div class="grid grid-cols-2 gap-4 mb-5 animate-fade-up h-16" style="animation-delay: 0.1s">
                        <a href="/docs" class="soft-btn variant-solid w-full h-full">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-solid fa-book-journal-whills text-sm"></i>
                                        <span class="font-bold text-sm tracking-wide">DOCS</span>
                                    </span>
                                </span>
                            </span>
                        </a>
                        <a href="/stats" class="soft-btn variant-outline w-full h-full">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-solid fa-chart-pie text-k-muted"></i>
                                        <span class="font-bold text-sm tracking-wide">STATS</span>
                                    </span>
                                </span>
                            </span>
                        </a>
                    </div>

                    <!-- owner + uploader -->
                    <div class="flex gap-3 justify-center mb-4 animate-fade-up" style="animation-delay: 0.15s">
                        <a href="/owner" class="soft-btn w-48 h-12" style="--surface-color: #6d28d9; --side-color: #3b0764; --text-color: #e9d5ff; --border-color: transparent;">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-solid fa-user-tie text-sm"></i>
                                        <span class="font-bold text-sm tracking-wide">OWNER</span>
                                    </span>
                                </span>
                            </span>
                        </a>
                        <a href="/uploader" class="soft-btn w-48 h-12" style="--surface-color: #164e63; --side-color: #0c2a35; --text-color: #a5f3fc; --border-color: transparent;">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-solid fa-cloud-arrow-up text-sm"></i>
                                        <span class="font-bold text-sm tracking-wide">UPLOADER</span>
                                    </span>
                                </span>
                            </span>
                        </a>
                    </div>

                    <!-- channel + github + share -->
                    <div class="flex gap-3 justify-center mb-4 animate-fade-up h-14" style="animation-delay: 0.2s">
                        <a id="btn-channel" href="#" target="_blank" class="flex-1 soft-btn variant-steel">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-brands fa-whatsapp text-lg text-emerald-400"></i>
                                    </span>
                                </span>
                            </span>
                        </a>
                        <a id="btn-source" href="#" target="_blank" class="flex-1 soft-btn variant-steel">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-brands fa-github text-lg text-k-muted"></i>
                                    </span>
                                </span>
                            </span>
                        </a>
                        <button onclick="share()" class="flex-1 soft-btn variant-steel">
                            <span class="soft-btn__wrapper">
                                <span class="soft-btn__content">
                                    <span class="soft-btn__inner">
                                        <i class="fa-solid fa-share-nodes text-lg text-slate-400"></i>
                                    </span>
                                </span>
                            </span>
                        </button>
                    </div>

                    <!-- footer -->
                    <div class="mt-6 pt-4 border-t border-k-border text-center animate-fade-up" style="animation-delay: 0.3s">
                        <p class="text-[10px] font-mono text-k-muted">
                            POWERED BY <span class="text-k-accent font-bold">SAURUS</span> &bull; 2026
                        </p>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        const minLoadTime = 800;
        const startLoad = Date.now();

        function initSoftButtons() {
            document.querySelectorAll('.soft-btn').forEach(btn => {
                const handle = (e) => {
                    if (['pointerleave','pointercancel','pointerup'].includes(e.type)) {
                        btn.classList.remove('soft-btn--active','soft-btn--left','soft-btn--right','soft-btn--middle');
                        try { btn.releasePointerCapture(e.pointerId); } catch(err){}
                        return;
                    }
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left, w = rect.width;
                    if(e.type === 'pointerdown') { btn.classList.add('soft-btn--active'); try { btn.setPointerCapture(e.pointerId); } catch(err){} }
                    btn.classList.remove('soft-btn--left','soft-btn--right','soft-btn--middle');
                    if(x < w * 0.33) btn.classList.add('soft-btn--left');
                    else if(x > w * 0.66) btn.classList.add('soft-btn--right');
                    else btn.classList.add('soft-btn--middle');
                };
                ['pointerdown','pointerup','pointerleave','pointercancel'].forEach(ev => btn.addEventListener(ev, handle));
                btn.addEventListener('pointermove', e => { if(btn.classList.contains('soft-btn--active')) handle(e); });
            });
        }

        function share() {
            if(navigator.share) {
                navigator.share({ title: document.title, url: window.location.href }).catch(console.error);
            } else {
                navigator.clipboard.writeText(window.location.href);
                const inner = document.querySelector('button[onclick="share()"] .soft-btn__inner');
                const orig = inner.innerHTML;
                inner.innerHTML = '<i class="fa-solid fa-check text-green-500"></i>';
                setTimeout(() => { inner.innerHTML = orig; }, 1500);
            }
        }

        fetch('/config')
            .then(res => res.json())
            .then(config => {
                document.getElementById('dash-title').innerText = config.settings.apiName;
                document.getElementById('dash-desc').innerText = config.settings.description;

                const totalEndpoints = Object.values(config.tags).reduce((a, arr) => a + arr.length, 0);
                document.getElementById('stat-endpoints').innerText = totalEndpoints;
                document.getElementById('stat-visitors').innerText = config.settings.visitors || '0';
                document.getElementById('stat-version').innerText = config.settings.apiVersion || 'v1';
                document.getElementById('badge-version').innerText = config.settings.apiVersion || 'v1.0.0';

                const btnChannel = document.getElementById('btn-channel');
                if(config.settings.channelUrl) btnChannel.href = config.settings.channelUrl;
                else btnChannel.style.display = 'none';

                const btnSource = document.getElementById('btn-source');
                if(config.settings.github) btnSource.href = config.settings.github;
                else btnSource.style.display = 'none';

                const thumbEl = document.getElementById('dash-thumb');
                thumbEl.src = config.settings.thumbnail;
                thumbEl.onerror = () => { thumbEl.src = 'https://placehold.co/600x400/16161f/7c3aed?text=API'; };

                if(config.settings.favicon) document.getElementById('favicon').href = config.settings.favicon;

                const elapsed = Date.now() - startLoad;
                const remaining = Math.max(0, minLoadTime - elapsed);
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    initSoftButtons();
                }, remaining);
            })
            .catch(err => {
                console.error(err);
                document.getElementById('dash-title').innerText = "KawaiiYumee";
                document.getElementById('dash-desc').innerText = "Simple Dashboard Template";
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('content').classList.remove('hidden');
                    initSoftButtons();
                }, 1000);
            });
    </script>
</body>
</html>
